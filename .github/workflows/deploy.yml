name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo systemctl restart shadowsocks-libev-local@local > /dev/null 2>&1
            sleep 3
            cd ~/foodbot
            git pull origin main
            docker compose down
            
            # Перенаправляем логи сборки в /dev/null, 
            # чтобы SSH не ждал "хвостов" от докера
            docker compose up -d --build > /dev/null 2>&1
            
            # Принудительно закрываем SSH сессию
            exit 0
